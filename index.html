body { font-family: 'Noto Sans JP', sans-serif; background: #f5f6fa; color: #222; }

/* ── Header ── */
.app-header {
  background: #111;
  padding: 18px 0 14px;
  text-align: center;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.app-header .brand {
  font-size: 1.35rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.25em;
}
.app-header .sub {
  font-size: 0.72rem;
  color: #aaa;
  letter-spacing: 0.12em;
  margin-top: 4px;
}

/* ── Landing ── */
#landing { display: block; }
#detail  { display: none; }

.landing-title {
  text-align: center;
  padding: 40px 20px 10px;
}
.landing-title h1 {
  font-size: 1.5rem; font-weight: 700; color: #1a1a2e;
}
.landing-title p {
  font-size: 0.85rem; color: #888; margin-top: 6px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 18px;
  max-width: 1100px;
  margin: 28px auto 60px;
  padding: 0 24px;
}

.company-card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 14px;
  padding: 28px 20px 20px;
  text-align: center;
  cursor: pointer;
  transition: box-shadow .2s, transform .15s;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.company-card:hover {
  box-shadow: 0 8px 28px rgba(0,0,0,0.10);
  transform: translateY(-3px);
}
.company-card img {
  height: 44px; max-width: 160px; object-fit: contain;
}
.company-card .card-fallback {
  font-size: 1.1rem; font-weight: 900;
  display: none;
}
.company-card .card-name {
  font-size: 0.85rem; font-weight: 700; color: #1a1a2e;
}
.company-card .card-sub {
  font-size: 0.72rem; color: #999;
}
.btn-detail {
  width: 100%;
  padding: 9px 0;
  border: none;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: opacity .15s;
  font-family: 'Noto Sans JP', sans-serif;
}
.btn-detail:hover { opacity: 0.85; }

/* ── Detail ── */
.detail-wrap {
  max-width: 940px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  margin: 20px 0 16px;
  padding: 8px 18px;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 0.78rem;
  font-weight: 600;
  color: #555;
  cursor: pointer;
  transition: background .15s;
  font-family: 'Noto Sans JP', sans-serif;
}
.back-btn:hover { background: #f5f5f5; }

.detail-header {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 14px;
  padding: 28px 32px;
  display: flex; align-items: center; gap: 28px;
  margin-bottom: 18px;
}
.detail-header img {
  height: 52px; max-width: 180px; object-fit: contain; flex-shrink: 0;
}
.detail-header .header-fallback {
  font-size: 1.3rem; font-weight: 900; flex-shrink: 0;
  display: none;
}
.detail-header .info .name {
  font-size: 1.35rem; font-weight: 800; color: #1a1a2e;
}
.detail-header .info .name-en {
  font-size: 0.78rem; color: #999; margin-top: 2px;
}
.detail-header .info .mission-q {
  font-size: 0.9rem; color: #555; margin-top: 8px;
  border-left: 3px solid #ccc;
  padding-left: 10px;
  line-height: 1.6;
}

/* ── Section Box ── */
.section-box {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 18px;
}
.section-heading {
  font-size: 1rem; font-weight: 700; color: #1a1a2e;
  border-bottom: 2.5px solid #ccc;
  padding-bottom: 8px; margin-bottom: 18px;
  display: inline-block;
}

.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 16px;
}
@media(max-width:700px) { .kpi-row { grid-template-columns: repeat(2,1fr); } }
.kpi-card {
  background: #f8f9fa;
  border-radius: 10px;
  padding: 16px 14px;
  text-align: center;
}
.kpi-label { font-size: 0.72rem; color: #999; font-weight: 600; margin-bottom: 6px; }
.kpi-value { font-size: 1.3rem; font-weight: 800; color: #1a1a2e; line-height: 1.2; }
.kpi-sub   { font-size: 0.7rem; color: #bbb; margin-top: 4px; }

/* ── Lists ── */
.info-list { list-style: none; padding: 0; }
.info-list li {
  padding: 8px 0 8px 18px;
  position: relative;
  font-size: 0.88rem;
  line-height: 1.7;
  color: #333;
  border-bottom: 1px solid #f3f3f3;
}
.info-list li:last-child { border-bottom: none; }
.info-list li::before {
  content: '';
  position: absolute; left: 0; top: 16px;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent, #1a73e8);
}

/* ── VM ── */
.vm-block { margin-bottom: 14px; }
.vm-label { font-size: 0.72rem; color: #999; font-weight: 600; letter-spacing: 0.08em; }
.vm-text  { font-size: 0.93rem; color: #333; margin-top: 4px; line-height: 1.7; }
.vm-mission { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }

/* ── Flow ── */
.flow-container {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  margin-top: 4px;
}
.flow-step {
  display: flex; align-items: center; gap: 8px;
  background: #f8f9fa; border-radius: 8px; padding: 8px 14px;
}
.flow-num {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.flow-label { font-size: 0.82rem; font-weight: 600; color: #333; }
.flow-arrow { font-size: 0.8rem; color: #bbb; }

.pq-item {
  border: 1px solid #f0f0f0;
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
  background: #fafafa;
}
.pq-meta {
  display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap;
}
.pq-badge {
  background: #1a1a2e; color: #fff;
  font-size: 0.68rem; font-weight: 600;
  padding: 2px 10px; border-radius: 20px;
}
.pq-pos  { font-size: 0.75rem; color: #666; }
.pq-date { font-size: 0.7rem; color: #aaa; }
.pq-q    { font-size: 0.88rem; color: #333; line-height: 1.7; }
.pq-note { font-size: 0.72rem; color: #bbb; margin-top: 12px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
.no-data { color: #bbb; font-size: 0.88rem; padding: 12px 0; }

.charts-row {

.source-label { font-size: 0.65rem; color: #bbb; font-weight: 600; letter-spacing: 0.1em; margin-bottom: 4px; }

/* ── Website ── */

/* ── Bottom back btn ── */

// ============================================================
// ユーティリティ
// ============================================================
function buildSourceHtml(sources) {
  if (!sources || sources.length === 0) return '';
  const links = sources.map(s =>
    `<a href="${s.url}" target="_blank" rel="noopener">${s.label}</a>`
  ).join('');
  return `<div class="source-block"><div class="source-label">SOURCE</div><div class="source-links">${links}</div></div>`;
}

function buildList(items, accent) {
  return `<ul class="info-list" style="--accent:${accent}">` +
    items.map(i => `<li>${i}</li>`).join('') + `</ul>`;
}

const chartInstances = {};
function destroyCharts() {
  Object.values(chartInstances).forEach(c => c.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);
}

function drawChart(canvasId, labels, data, label, accent, unitSuffix) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const hasData = data.some(v => v !== null && v !== undefined);
  if (!hasData) {
    ctx.parentElement.innerHTML = '<div style="color:#bbb;font-size:0.85rem;text-align:center;padding:80px 0;">非公開</div>';
    return;
  }
  const values = data.map(v => v ?? 0);
  chartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: accent + 'cc',
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
        datalabels: { display: false },
      },
      scales: {
        x: {
          grid: { display: false },
          border: { color: '#e0e0e0' },
          ticks: { font: { size: 11, family: 'Noto Sans JP' }, color: '#888' }
        },
        y: {
          display: false,
          grid: { display: false },
          max: Math.max(...values) * 1.3,
        }
      },
      // カスタムデータラベル（plugin）
      layout: { padding: { top: 28 } },
    },
    plugins: [{
      id: 'topLabels',
      afterDatasetsDraw(chart) {
        const { ctx, data } = chart;
        chart.getDatasetMeta(0).data.forEach((bar, i) => {
          const val = data.datasets[0].data[i];
          if (!val) return;
          const display = unitSuffix === '億'
            ? (val >= 1 ? val + '億' : val + '億')
            : Math.round(val) + '名';
          ctx.save();
          ctx.font = 'bold 11px Noto Sans JP, sans-serif';
          ctx.fillStyle = '#444';
          ctx.textAlign = 'center';
          ctx.fillText(display, bar.x, bar.y - 6);
          ctx.restore();
        });
      }
    }]
  });
}

      <div class="section-heading" style="border-color:${a}">面接過去問</div>
      ${pqHtml}
    </div>

    <!-- 数字データ -->
    <div class="section-box">
      <div class="section-heading" style="border-color:${a}">数字データ</div>
      <div class="charts-row">
        <div>
          <div style="font-size:0.82rem;font-weight:600;color:#555;margin-bottom:8px">売上高推移（億円）</div>
          <div class="chart-wrap"><canvas id="chart-rev"></canvas></div>
        </div>
        <div>
          <div style="font-size:0.82rem;font-weight:600;color:#555;margin-bottom:8px">従業員数推移（名）</div>
          <div class="chart-wrap"><canvas id="chart-emp"></canvas></div>
        </div>
      </div>
      ${buildSourceHtml(d.sources.growth)}
    </div>

    <!-- 公式サイト -->
    <div class="section-box">
      <div class="section-heading" style="border-color:${a}">公式サイト</div>
      <a href="${d.website}" target="_blank" rel="noopener" class="website-link" style="color:${a}">
        🌐 ${d.website}
      </a>
      <div class="website-note">※ 新しいタブで開きます</div>
    </div>
  `;

  document.getElementById('landing').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  window.scrollTo(0, 0);

  // Charts
  setTimeout(() => {
    drawChart('chart-rev', d.growth.labels, d.growth.revenue, '売上高', a, '億');
    drawChart('chart-emp', d.growth.labels, d.growth.employees, '従業員数', a, '名');
  }, 50);
}

function showLanding() {
  destroyCharts();
  document.getElementById('detail').style.display = 'none';
  document.getElementById('landing').style.display = 'block';
  window.scrollTo(0, 0);
}

// Init
renderLanding();
</script>
</body>
</html>
